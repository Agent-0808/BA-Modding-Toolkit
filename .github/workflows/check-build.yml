name: PR Build Check (GUI)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Dependencies
        run: uv export --no-hashes -o requirements.txt && pip install -r requirements.txt

      # 从 pyproject.toml 提取版本号并生成 _version.py 文件
      - name: Extract Version and Generate Meta
        id: get_version
        shell: python
        run: |
          import os
          import re
          import tomllib

          # 读取 pyproject.toml
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
              version = data["project"]["version"]

          print(f"Detected version: {version}")

          # 生成 _version.py 供 Python 代码引用
          with open("src/ba_modding_toolkit/_version.py", "w") as f:
              f.write(f'__version__ = "{version}"\n')

          # Nuitka 的 file-version 必须是纯数字格式 (如 1.2.3.4)
          # 提取开头的数字段（支持最多四段，遇到非数字/点就停）
          match = re.match(r'[vV]?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?', version)
          if match:
              major, minor, patch, fourth = match.groups()
              major = major or '0'
              minor = minor or '0'
              patch = patch or '0'

              # 如果第四段已经存在（原版本号有四位数字），直接使用
              if fourth is not None:
                  file_version = f"{major}.{minor}.{patch}.{fourth}"
              else:
                  # 没有第四段，判断是否为预发布版
                  if re.search(r'(alpha|beta|rc|dev|a|b|c)', version, re.I):
                      file_version = f"{major}.{minor}.{patch}.8888"
                  else:
                      file_version = f"{major}.{minor}.{patch}.0"
          else:
              file_version = "0.0.0.0"
          print(f"File version for Nuitka: {file_version}")

          # 将版本号设置到 GitHub Action 的输出变量
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f"version={version}", file=fh)
              print(f"file_version={file_version}", file=fh)

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          working-directory: src
          script-name: ba_modding_toolkit
          mode: onefile
          python-flag: "-m"

          # 元数据
          windows-icon-from-ico: ba_modding_toolkit/assets/eligma.ico
          product-name: "BA Modding Toolkit"
          product-version: ${{ steps.get_version.outputs.file_version }}
          file-version: ${{ steps.get_version.outputs.file_version }}
          file-description: "BA Modding Toolkit (Test Build)"
          company-name: "Agent-0808"
          copyright: "Copyright ©2025-2026 Agent-0808. Licensed under GPLv3."
          trademarks: "Blue Archive ©NEXON Games Co., Ltd. & Yostar, Inc. This tool is unofficial and not endorsed by them."

          clang: true
          low-memory: true
          enable-plugins: tk-inter
          include-package: |
            ba_modding_toolkit
            UnityPy.resources
          include-package-data: |
            ba_modding_toolkit
            UnityPy
            archspec
          include-data-dir: |
            ba_modding_toolkit/assets=ba_modding_toolkit/assets
            ba_modding_toolkit/locales=ba_modding_toolkit/locales
          windows-console-mode: disable
          output-dir: ../build
          output-file: "BA-Modding-Toolkit.exe"
          assume-yes-for-downloads: true

      # 整理发布文件夹
      - name: Prepare Release Directory
        run: |
          New-Item -ItemType Directory -Path "publish" -Force
          Copy-Item -Path "build/BA-Modding-Toolkit.exe" -Destination "publish/"
          Copy-Item -Path "src/ba_modding_toolkit/locales" -Destination "publish/locales" -Recurse
        shell: powershell

      # 上传测试版 Artifact
      - name: Upload Test Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BA-Modding-Toolkit-Test-Build-PR${{ github.event.pull_request.number }}
          path: publish/
