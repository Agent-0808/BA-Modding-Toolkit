name: PR Build Check (GUI)

on:
  pull_request:
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Dependencies
        run: uv export --no-hashes -o requirements.txt && pip install -r requirements.txt

      # 从 pyproject.toml 提取版本号并生成 _version.py 文件
      - name: Extract Version and Generate Meta
        id: get_version
        run: uv run scripts/extract_version.py

      - name: Build Executable with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          working-directory: src
          script-name: ba_modding_toolkit
          mode: onefile
          python-flag: "-m"

          # 元数据
          windows-icon-from-ico: ba_modding_toolkit/assets/eligma.ico
          product-name: "BA Modding Toolkit"
          product-version: ${{ steps.get_version.outputs.file_version }}
          file-version: ${{ steps.get_version.outputs.file_version }}
          file-description: "BA Modding Toolkit (Test Build)"
          company-name: "Agent-0808"
          copyright: "Copyright ©2025-2026 Agent-0808. Licensed under GPLv3."
          trademarks: "Blue Archive ©NEXON Games Co., Ltd. & Yostar, Inc. This tool is unofficial and not endorsed by them."

          clang: true
          low-memory: true
          enable-plugins: tk-inter
          include-package: |
            ba_modding_toolkit
            UnityPy.resources
          include-package-data: |
            ba_modding_toolkit
            UnityPy
            archspec
          include-data-dir: |
            ba_modding_toolkit/assets=ba_modding_toolkit/assets
            ba_modding_toolkit/locales=ba_modding_toolkit/locales
          windows-console-mode: disable
          output-dir: ../build
          output-file: "BA-Modding-Toolkit.exe"
          assume-yes-for-downloads: true

      # 整理发布文件夹
      - name: Prepare Release Directory
        run: |
          New-Item -ItemType Directory -Path "publish" -Force
          Copy-Item -Path "build/BA-Modding-Toolkit.exe" -Destination "publish/"
          Copy-Item -Path "src/ba_modding_toolkit/locales" -Destination "publish/locales" -Recurse
        shell: powershell

      # 上传测试版 Artifact
      - name: Upload Test Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BA-Modding-Toolkit-Test-Build-PR${{ github.event.pull_request.number }}
          path: publish/
